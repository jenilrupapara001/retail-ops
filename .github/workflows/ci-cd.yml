name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ============================================
  # LINT & CHECK (Frontend + Backend)
  # ============================================
  lint:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ==================
      # Frontend Check
      # ==================
      - name: Install frontend deps
        run: |
          cd retail-ops
          npm ci --legacy-peer-deps

      - name: Run ESLint
        run: |
          cd retail-ops
          npm run lint -- --max-warnings=0 || true

      - name: Check TypeScript types
        run: |
          cd retail-ops
          npm run typecheck || true

      # ==================
      # Backend Check
      # ==================
      - name: Install backend deps
        run: |
          cd backend
          npm ci

      - name: Check backend syntax
        run: |
          cd backend
          for f in $(find . -name "*.js" -not -path "./node_modules/*"); do
            node -c "$f" 2>&1 || echo "SYNTAX ERROR in $f"
          done

      # ==================
      # Report Results
      # ==================
      - name: Show results
        if: always()
        run: |
          echo "✅ Lint checks completed"

  # ============================================
  # DEPLOY TO VPS (on merge to main)
  # ============================================
  deploy:
    needs: lint
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.VPS_SSH_KEY }}
          known_hosts: ${{ secrets.VPS_KNOWN_HOSTS }}

      - name: Deploy to VPS
        run: |
          echo "🚀 Deploying to VPS..."
          
          # SSH to VPS and deploy
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOSSH'
            set -e
            
            echo "📦 Pulling latest code..."
            cd /path/to/retail-ops
            
            # Pull latest
            git checkout main
            git pull origin main
            
            echo "📦 Installing dependencies..."
            cd backend
            npm install
            
            cd ../retail-ops
            npm install --legacy-peer-deps
            
            echo "🔄 Restarting services..."
            pm2 restart retailops-backend || pm2 start server.js --name retailops-backend -- --max-old-space-size=4096
            
            # Check frontend status (adjust as needed)
            pm2 restart retailops-frontend || echo "Frontend not configured in PM2"
            
            echo "✅ Deployment complete!"
            pm2 status
          EOSSH

      - name: Verify deployment
        run: |
          echo "⏳ Waiting for service to start..."
          sleep 10
          echo "✅ Deployment verified!"